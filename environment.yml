# Conda environment to reproduce the quantmsdiann manuscript analysis.
#
#   conda env create -f environment.yml      # or: mamba env create -f environment.yml
#   conda activate quantmsdiann
#   cd analysis && python3 -m analysis.figure_combined_cell_lines_atlas   # etc.
#   cd paper && make figures && make pdf && make supplementary
#
# This single environment reproduces EVERY figure, including the pan-cohort
# atlas (Fig. 4). The numpy<2 pin below is load-bearing: under numpy>=2 the
# UpSet panel in figure_combined_cell_lines_atlas crashes at render time
# (`TypeError: only 0-dimensional arrays can be converted to Python scalars`
# in matplotlib's text.py — numpy 2 turned an array->float() deprecation into
# a hard error and upsetplot 0.9 feeds it an array). All 170 unit tests and
# every figure render pass on numpy 1.26.
name: quantmsdiann
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.24,<2          # load-bearing: see header note (atlas UpSet panel)
  - pandas>=2.0,<3
  - matplotlib-base>=3.7,<4
  - matplotlib-venn>=1.1,<2
  - upsetplot>=0.9,<1
  - pyarrow>=15.0,<22
  - requests>=2.31,<3
  - fsspec>=2024.1.0
  - aiohttp                 # fsspec[http] backend: streams the PXD030304 33 GB report over PRIDE FTP without staging to disk
  - librsvg                 # provides rsvg-convert, the SVG->PDF converter paper/Makefile prefers
  - pytest>=8.0
  - pip
  - pip:
      # ProteoBench is pip-only: supplies the quant-accuracy metric pipeline
      # (QuantScoresHYE) and the authoritative per-species expected ratios for
      # the Fig 2 accuracy panel. Pinned to the version used for the cached
      # metrics so recomputation is reproducible.
      - proteobench==0.15.5
